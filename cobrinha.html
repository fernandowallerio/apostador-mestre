<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogo da Cobrinha</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --snake: #39d353;
      --food: #ff7b72;
      --text: #c9d1d9;
      --muted: #8b949e;
      --grid: #21262d;
      --accent: #58a6ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1f2937, var(--bg));
      color: var(--text);
      padding: 1rem;
    }

    .app {
      width: min(95vw, 520px);
      background: var(--panel);
      border-radius: 16px;
      padding: 1rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .5rem;
      margin-bottom: .75rem;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 1.2rem;
      color: var(--accent);
    }

    .stats {
      display: flex;
      gap: .75rem;
      color: var(--muted);
      font-size: .95rem;
    }

    .controls {
      display: flex;
      gap: .5rem;
      margin-bottom: .75rem;
      flex-wrap: wrap;
    }

    button, .back {
      border: none;
      border-radius: 10px;
      padding: .55rem .85rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }

    .start { background: #2ea043; color: white; }
    .restart { background: #1f6feb; color: white; }
    .back { background: #30363d; color: var(--text); }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        #0b1016;
      background-size: 20px 20px;
      border: 1px solid #30363d;
    }

    .hint {
      margin-top: .8rem;
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="header">
      <h1>🐍 Jogo da Cobrinha</h1>
      <div class="stats">
        <span>Pontos: <strong id="score">0</strong></span>
        <span>Recorde: <strong id="highScore">0</strong></span>
      </div>
    </div>

    <div class="controls">
      <button class="start" id="startBtn">Iniciar</button>
      <button class="restart" id="restartBtn">Reiniciar</button>
      <a class="back" href="index.html">Voltar ao site</a>
    </div>

    <canvas id="game" width="400" height="400" aria-label="Tela do jogo da cobrinha"></canvas>

    <p class="hint">Use as setas do teclado para mover. Em celular, deslize o dedo na direção desejada. Evite bater nas paredes e no próprio corpo!</p>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    const size = 20;
    const tiles = canvas.width / size;

    let snake;
    let direction;
    let nextDirection;
    let food;
    let score;
    let timer;
    let running = false;

    const highScoreKey = 'snake_high_score';
    const getHighScore = () => Number(localStorage.getItem(highScoreKey) || 0);
    const setHighScore = (value) => localStorage.setItem(highScoreKey, String(value));

    function resetState() {
      snake = [{ x: 10, y: 10 }];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      updateScore();
      spawnFood();
      draw();
    }

    function updateScore() {
      scoreEl.textContent = score;
      const hs = Math.max(score, getHighScore());
      highScoreEl.textContent = hs;
      if (hs !== getHighScore()) setHighScore(hs);
    }

    function spawnFood() {
      do {
        food = {
          x: Math.floor(Math.random() * tiles),
          y: Math.floor(Math.random() * tiles)
        };
      } while (snake.some((piece) => piece.x === food.x && piece.y === food.y));
    }

    function step() {
      direction = nextDirection;
      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      const hitWall = head.x < 0 || head.y < 0 || head.x >= tiles || head.y >= tiles;
      const hitSelf = snake.some((piece) => piece.x === head.x && piece.y === head.y);

      if (hitWall || hitSelf) {
        gameOver();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        updateScore();
        spawnFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#ff7b72';
      ctx.beginPath();
      const fx = food.x * size + size / 2;
      const fy = food.y * size + size / 2;
      ctx.arc(fx, fy, size * 0.35, 0, Math.PI * 2);
      ctx.fill();

      snake.forEach((piece, index) => {
        ctx.fillStyle = index === 0 ? '#2ea043' : '#39d353';
        ctx.fillRect(piece.x * size + 1, piece.y * size + 1, size - 2, size - 2);
      });
    }

    function startGame() {
      if (running) return;
      running = true;
      timer = setInterval(step, 120);
    }

    function gameOver() {
      clearInterval(timer);
      running = false;
      ctx.fillStyle = 'rgba(0, 0, 0, .6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 30px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Fim de jogo', canvas.width / 2, canvas.height / 2 - 8);
      ctx.font = '16px Arial';
      ctx.fillText('Clique em Reiniciar para jogar novamente', canvas.width / 2, canvas.height / 2 + 24);
    }

    function restartGame() {
      clearInterval(timer);
      running = false;
      resetState();
      startGame();
    }

    document.addEventListener('keydown', (event) => {
      const keyMap = {
        ArrowUp: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 }
      };

      if (!keyMap[event.key]) return;
      event.preventDefault();
      const proposed = keyMap[event.key];
      const opposite = proposed.x === -direction.x && proposed.y === -direction.y;
      if (!opposite) nextDirection = proposed;
    });

    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener('touchstart', (event) => {
      const touch = event.touches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    canvas.addEventListener('touchend', (event) => {
      const touch = event.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;

      if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;

      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
        if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
      } else {
        if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
        if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
      }
    }, { passive: true });

    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', restartGame);

    highScoreEl.textContent = getHighScore();
    resetState();
  </script>
</body>
</html>
