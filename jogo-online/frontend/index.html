<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Batalha Espacial – Protótipo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="top-bar">
    <div>
      <strong>Protótipo: Batalha Espacial</strong>
      <div class="hint" id="turnStatus"></div>
    </div>
    <div class="controls">
      <button id="modeMove" class="active">Modo: Movimento</button>
      <button id="modeFire">Modo: Tiro</button>
      <button id="finishPlanning">Finalizar planejamento</button>
      <button id="executeTurn">Executar turno</button>
      <button id="clearDestinations">Limpar destinos</button>
    </div>
  </div>
  <div class="arena-wrap">
    <canvas id="spaceCanvas"></canvas>
  </div>
  <div class="legend" id="legend"></div>

  <script src="../game/engine.js"></script>
  <script src="ui.js"></script>
</body>
</html>
